<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning Languages</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <script src="script.js"></script>
    <!-- Navbar -->
    <header>
        <h1>🌍 Learning Languages</h1>
        <nav>
            <a href="#">Home</a>
            <a href="#">Courses</a>
            <a href="#">About</a>
        </nav>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <h2>Belajar Bahasa Dunia dengan Mudah</h2>
        <p>Pilih bahasa yang ingin kamu pelajari dan mulai sekarang!</p>
    </section>

    <!-- Language List -->
    <section class="languages">
        <div class="card">
            <h3>🇬🇧 English</h3>
            <p>Belajar bahasa Inggris dari dasar</p>
            <button>Mulai</button>
        </div>

        <div class="card">
            <h3>🇯🇵 Japanese</h3>
            <p>Pelajari Hiragana, Katakana, dan Kanji</p>
            <button>Mulai</button>
        </div>

        <div class="card">
            <h3>🇰🇷 Korean</h3>
            <p>Belajar Hangul dan percakapan sehari-hari</p>
            <button>Mulai</button>
        </div>
    </section>

</body>
</html>
